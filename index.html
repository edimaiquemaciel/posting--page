<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Blog Pessoal</h1>
    </header>
    <main>
        <section id="section-form">
            <h2>Criar Nova Postagem</h2>
            <form id="form-blog">
                <div class="card-form">
                    <label for="titulo">Título</label>
                    <input type="text" name="titulo" id="titulo" placeholder="Sobre o que você vai escrever hoje?">
                </div>
                <div class="card-form">
                    <label for="conteudo">Conteúdo</label>
                    <textarea name="conteudo" id="conteudo" rows="10" placeholder="Desenvolva suas idéias aqui..."></textarea>
                </div>
                <input id="btn-postar" type="submit" value="Publicar Agora">
            </form>
        </section>
        <section id="section-post">
            <h2>Postagens Recentes</h2>
            <div id="posts">

            </div>
        </section>

    </main>
    <footer>
        <p>&copy; 2026 Blog | Todos os direitos reservados.</p>
    </footer>
    <script>
        class PacoteBuscar {
            constructor(baseURL) {
                this.baseURL = baseURL;
            }

            post(endpoint, body) {
                return fetch(this.baseURL + endpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(body)
                })
                .then(response => response.json())
            }
        }

        const API = new PacoteBuscar("https://jsonplaceholder.typicode.com");
        const renderizadorTitulo = document.querySelector("#renderizador-titulo");
        const renderizadorConteudo = document.querySelector("#renderizador-conteudo");
        const titulo =document.querySelector("#titulo");
        const conteudo =document.querySelector("#conteudo");
        const form  = document.querySelector("#form-blog");
        form.addEventListener("submit", event => {
            event.preventDefault();
            const data = {
                title: titulo.value,
                body: conteudo.value,
                userId: 1
            }
            API.post("/posts", data)
            .then(data => data);
            const dataAtual = new Date().toLocaleDateString('pt-BR');

            document.querySelector("#posts").insertAdjacentHTML("beforeend",`
            <div class="post-card">
                <span style="font-size: 0.75rem; color: #9ca3af;">${dataAtual}</span>
                <h3>${titulo.value}</h3>
                <p>${conteudo.value}</p>
            </div>
            `)
            titulo.value = "";
            conteudo.value = "";
        })
        
    </script>
</body>
</html>
